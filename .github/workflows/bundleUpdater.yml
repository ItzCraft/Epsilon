name: Update Bundles

on: [push, pull_request]


permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run bundle updater
        run: |
          chmod +x ./gradlew
          ./gradlew updateBundles --no-daemon

      - name: Commit & push bundles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/bundles/   # добавляем все бандлы целиком
          git commit -m "chore: update bundles [skip ci]" || echo "No changes"
          git push