name: Update Bundles
on:
  push:
    branches: [ master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run updater
        run: |
          chmod +x ./gradlew
          ./gradlew updateBundles --no-daemon

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/bundles/
          git commit -m "chore: auto-sync bundles (EN fallback) [skip ci]" || echo "No changes"
          git push