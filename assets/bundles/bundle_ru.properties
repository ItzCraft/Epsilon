unit.epsilon-sporacrawler.description = Существо, сделанное из Фенспора. Имеет крепкие зубы, которые могут повредить инфраструктуру.

unit.epsilon-mycelist.name = Мицелист
unit.epsilon-mycelist.description = Другой вид фенспорских существ. Медленнее спорового ползуна, но вместе с крепкими зубами обладает дальнобойным оружием.