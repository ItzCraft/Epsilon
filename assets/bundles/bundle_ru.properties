block.epsilon-fylion-smelter.name = Плавильня Филиона
block.epsilon-fylion-smelter.description = Выплавляет кальцит и потребляет энергию из кварца, чтобы получить уникальный материал — Филион.

block.epsilon-tantalum-synthesizer.name = Синтезатор Тантала
block.epsilon-tantalum-synthesizer.description = Синтезирует красный песок и магнетит для создания прочного сформованного материала. После этого он использует заряд от Филиона, чтобы соединить всё вместе и уничтожить загрязнение, полученное от магнетита.

block.epsilon-anveiur-forge.name = Кузница Анвейра
block.epsilon-anveiur-forge.description = Использует встроенный пресс для сжатия филиона и смешивания озона с ним. После этого используйте тепло, чтобы расплавить полученный материал и добавить дополнительный озон.

block.epsilon-sand-filter.name = Фильтр красного песка
block.epsilon-sand-filter.description = Расщепляет красный песок на мелкие кусочки, чтобы получить ресурсы, содержащиеся внутри.

