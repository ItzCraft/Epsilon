# Items
item.epsilon-item-gelionyte.name = Гелионит
item.epsilon-item-gelionyte.description = Низкозаряженный, хрупкий кристалл. Можно использовать для дополнительной брони/заряда. 

item.epsilon-item-calcite.name = Кальцит
item.epsilon-item-calcite.description = Горючий материал, встречающийся в виде руды, полезен для зданий и тепла.

item.epsilon-item-quartz.name = Кварц
item.epsilon-item-quartz.description = Материал, похожий на кристалл, с очень низкой зарядной способностью. Очень хорош для того, чтобы создавать оборону.

item.epsilon-item-fylion.name = Филион
item.epsilon-item-fylion.description = Смесь кальцита и кварца. Кварцевый заряд был потерян при соединении, но слабая воспламеняемость осталась.

item.epsilon-item-red-sand.name = Красный песок
item.epsilon-item-red-sand.description = Буквально, это красный песок с небольшой воспламеняемостью. Не особо полезный минерал .

item.epsilon-item-magnetite.name = Магнетит
item.epsilon-item-magnetite.description = Сырое железо, которое было слабо зараженно в ходе распада клеток жизненных форм. Его всё ещё можно использовать во многих целях, он также взрывоопасный и обладает низкой радиоактивностью.

item.epsilon-item-tantalum.name = Тантал
item.epsilon-item-tantalum.description = Минерал, полученный из тяжёлой смеси. У нешо много свойств благодаря смеси, очень хорош для создания юнитов.

item.epsilon-item-anveiur.name = Анвейр
item.epsilon-item-anveiur.description = Очередная смесь, сделанная из озона и филиона. Горючий и взрывающийся. Сложно использовать.  

