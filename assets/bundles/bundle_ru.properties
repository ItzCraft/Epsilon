# Missions
item.epsilon-mission1.name = Где это я?
item.epsilon-mission1.description = Моё ядро потерпело крушение.. Я его отремонтировал, но это не очень помогает. Я застрял на неизвестной планете, с условным эхо жизни. Это не выглядит дружелюбно. Что ж, мне нужно получить ответы. \n\n\n  - Есть ли на планете разумная жизнь? \n  - Почему произошло крушение? \n - Каково мое прошлое?
item.epsilon-mission1.details = Этот предмет может быть обновлен в зависимости от того, сколько кампании вы завершили. Так что посматривайте на него иногда :3 


# Items

item.epsilon-item-gelionyte.name = Гелионит
item.epsilon-item-gelionyte.description = Малозаряженный, хрупкий кристалл. Можно использовать в качестве дополнительной брони/дополнительной зарядки. 

item.epsilon-item-calcite.name = Кальцит
item.epsilon-item-calcite.description = Легковоспламеняющийся материал, найденный в виде руды, хорош для зданий и тепла.

item.epsilon-item-quartz.name = Кварц
item.epsilon-item-quartz.description = Кристаллоподобный материал с очень низкой зарядной способностью. Очень хорош для защиты против врагов.

item.epsilon-item-fylion.name = Филион
item.epsilon-item-fylion.description = Смесь кальцита и кварца. Кварцевый заряд был потерян при процессе соединения, но слабая горючесть осталась.

item.epsilon-item-red-sand.name = Красный песок
item.epsilon-item-red-sand.description = Это красный песок, имеют малую горючесть. Не очень полезный минерал. 

item.epsilon-item-magnetite.name = Магнетит
item.epsilon-item-magnetite.description = Сырое железо, которое было заражено из-за жизненной деятельности на планете. Его еще можно использовать во многих вещах, также он взрывоопасен и имеет малую радиоактивность.

item.epsilon-item-tantalum.name = Тантал
item.epsilon-item-tantalum.description = Минерал, изготавленный из твердой смеси. Имеет много свойств из-за смеси, очень хороши для укрепления агрегатов. 

item.epsilon-item-anveiur.name = Анвеир
item.epsilon-item-anveiur.description = Еще одна смесь, сделанная из озона и филиона. Легковоспламеняющиеся и взрывоопасная. Используемый в продвинутый технологиях.


