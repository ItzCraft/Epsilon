# Items

item.epsilon-item-gelionyte.name = Gelionit
item.epsilon-item-gelionyte.description = Kristal rapuh bermuatan rendah. Dapat digunakan untuk menambah armor atau muatan tambahan.

item.epsilon-item-calcite.name = Kalsit
item.epsilon-item-calcite.description = Bahan yang mudah terbakar, ditemukan sebagai bijih, baik untuk bangunan dan teknologi pemanas.

item.epsilon-item-quartz.name = Kuarsa
item.epsilon-item-quartz.description = Material seperti kristal dengan kemampuan pengisian daya yang sangat rendah. Sangat bagus untuk pertahanan tahap awal.
item.epsilon-item-quartz.details = Ga! jangan sebut minecraft!

item.epsilon-item-fylion.name = Filion
item.epsilon-item-fylion.description = Campuran antara kalsit dan kuarsa. Muatan kuarsa hilang saat proses penyambungan, tetapi sifat mudah terbakarnya tetap lemah.

item.epsilon-item-red-sand.name = Pasir Merah
item.epsilon-item-red-sand.description = Basically a red sand, have small flammability. Not really useful mineral.
item.epsilon-item-red-sand.details = Ga! jangan sebut asthosus!

item.epsilon-item-magnetite.name = Magnetit
item.epsilon-item-magnetite.description = Besi mentah, yang telah terkontaminasi oleh kehidupan di planet Kallistea. Bersifat eksplosif dan memiliki kadar radioaktivitas yang rendah.

item.epsilon-item-tantalum.name = Tantalum
item.epsilon-item-tantalum.description = Mineral yang terbuat dari campuran keras. Memiliki banyak khasiat karena campurannya, sangat baik untuk memperkuat unit.

item.epsilon-item-anveiur.name = Anveiur
item.epsilon-item-anveiur.description = Campuran lain, terbuat dari ozon dan filion. Mudah terbakar dan meledak. Sulit digunakan.

