# Sector Dialogues Region
riddles-1 = Ouch...
riddles-2 = This crash damaged the core badly...
riddles-3 = Where am I? I should analyze my modules...
riddles-4 = My memory module is critically damaged.
riddles-5 = That's why I don't remember most things...
riddles-6 = No panic. Firstly, I need to repair my core.
riddles-7 = Otherwise, my existence will end here.
riddles-8 = Wow, these crystals are shiny.
riddles-9 = I should try to break them.

riddles-10 = The Survived parts of my module remembers... this is Gelionyte.
riddles-11 = Interesting. I think that's enough Gelionyte for now.
riddles-12 = I need to explore the area around the core.

riddles-13 = Are those... plants?
riddles-14 = Wonderful...

riddles-15 = Ore? Cal... Calc... Calcite!

riddles-16 = Well, let's systematize everything.

riddles-17 = First of all, is there life?..
riddles-18 = Or at least an echo of life.

riddles-19 = Next, most of my memory module is broken.
riddles-20 = And of course, my core is damaged too.
riddles-21 = Time to repair it.

riddles-22 = Okay, it's repaired now.
riddles-23 = Time to continue exploring.

riddles-extra1 = No, I need to fix my core first.
riddles-extra2 = I don't feel good near those plants...

aband-outp-1 = It's been several days since I saw those plants.
aband-outp-2 = Does this planet have intelligent life?
aband-outp-3 = If it got plants, intelligent life could appear too.
aband-outp-4 = I should find those plants again.

aband-outp-objective-1 = [accent]Explore the area around core[]

aband-outp-5 = Well here are they.
aband-outp-6 = Time to analyze them.
aband-outp-7 = But I don't have enough of equipment to analyze them properly..
aband-outp-8 = So I can't tell if there's any intelligent life.
aband-outp-9 = Wait, is that ore?
aband-outp-10 = Definitely ore.  Seems similar to Gelionyte.

aband-outp-objective-2 = [accent]Get 250 quartz into the core[]

aband-outp-11 = Okay that's enough quartz for now I think.
aband-outp-12 = Later I'll think what I can do with it.
aband-outp-13 = For now I should explore the area more.
aband-outp-14 = What is THAT!?

aband-outp-objective-3 = [accent]Destroy unforeseen creature[]

aband-outp-15 = I can't believe what I have done..
aband-outp-16 = Did I just have killed another lifeform?
aband-outp-17 = But it tried to kill me too.
aband-outp-18 = I need to move farther. I've got no time to stay here
aband-outp-19 = What is that? Buildings?
aband-outp-20 = It's looks like an abandoned outpost or something like that
aband-outp-21 = But what happened here? Why it looks like that?
aband-outp-22 = Is some kind of catastrophe happened here?
aband-outp-23 = Everything looks ruined
aband-outp-24 = I should try to find anything useful here

aband-outp-objective-4 = [accent]Find anything useful[]

aband-outp-25 = Is that a turret?

aband-outp-objective-5 = [accent]Look what's written on it[]
aband-outp-objective-51 = [accent]To view it, click on it and then click the "eye" button.[]

aband-outp-26 = Newspaper? let me look what is written here
newspaper-1 = Last news: New Incers organization made an experiment with a newly invented life form, \nwhich resulted positive results. But some information was classified. \nIf you want to participate in those experiments, notify us.
incers-newspaper1 = Newspaper

aband-outp-27 = New Incers organization? New lifeform?
aband-outp-28 = So intelligent life does exist here.
aband-outp-29 = Or there was..
aband-outp-30 = I don't think I can find anything more useful here. I should go back to my core.

aband-outp-31 = I still can't imagine what should happen to destroy an entire outpost.
aband-outp-32 = something like a war? Not sure.
aband-outp-33 = No not this again

aband-outp-objective-6 = [accent]Save yourself (tip: run)[]

aband-outp-35 = that was so close
aband-outp-36 = But I'm alive. with broken weapon. nice
aband-outp-37 = And the worst thing, is that I don't know how I should repair it
aband-outp-38 = I need to rest

# Items
item.epsilon-item-gelionyte.name = Gelionyte
item.epsilon-item-gelionyte.description = A low-charged, fragile crystal. Can be used for more armor/additional charge. 

item.epsilon-item-calcite.name = Calcite
item.epsilon-item-calcite.description = A flammable material, found as ore, good for buildings and heat.

item.epsilon-item-quartz.name = Quartz
item.epsilon-item-quartz.description = A crystal-like material with very low-charge ability. Very good for making defense against your opponent.

item.epsilon-item-fylion.name = Fylion
item.epsilon-item-fylion.description = A mixture between Calcite and Quartz. The Quartz charge was lost at the connection, but weak flammability remained.

item.epsilon-item-red-sand.name = Red Sand
item.epsilon-item-red-sand.description = Basically a red sand, have small flammability. Not really useful mineral.

item.epsilon-item-magnetite.name = Magnetite
item.epsilon-item-magnetite.description = Raw iron, which have been infected due to planet's life. It is still can be used in many things, also it is explosive and has small radioactivity.

item.epsilon-item-tantalum.name = Tantalum
item.epsilon-item-tantalum.description = Mineral, made by hard mixture. Have a lot of properties because of mixture, very good for strengthening units.

item.epsilon-item-anveiur.name = Anveiur
item.epsilon-item-anveiur.description = Another mixture, made out of Ozone and Fylion. Flammable and explosable. Hard to use. 

