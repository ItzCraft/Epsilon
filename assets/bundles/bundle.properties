# Production

# Drills
block.epsilon-pit-mining-rig.name = Pit Mining Rig
block.epsilon-pit-mining-rig.description = Continuously drilling the mineral deposit until it's collectable, Using advance technique to extract the deposit and transfer the collectable through the exit.

block.epsilon-breaker-drill.name = Breaker Drill
block.epsilon-breaker-drill.description = Using intense laser to break apart the mineral deposit. Intensity can be adjusted. Higher output > Higher usage. Higher usage is more efficient then Low usage but it will damage the drill slowly. 

# Power
block.epsilon-quartz-generator.name = Quartz Generator
block.epsilon-quartz-generator.description = A generator which consumes stored energy from quartz
block.epsilon-quartz-node.name = Quartz Node
block.epsilon-quartz-node.description = Transfers the received energy in all directions

# Crafting
block.epsilon-fylion-smelter.name = Fylion Smelter
block.epsilon-fylion-smelter.description = Smelts Calcite and consuming power from Quartz to produce an unique material [accent]Fylion[]
block.epsilon-tantalum-synthesizer.name = Tantalum Synthesizer
block.epsilon-tantalum-synthesizer.description = Synthesizes Red sand and Magnetite to make a strong formed material. After that it uses charge from Fylion to connect it all together and destroy the contamination received from Magnetite.
block.epsilon-anveiur-forge.name = Anveiur Forge
block.epsilon-anveiur-forge.description = Uses a built-in press to compress Fylion and mix Ozone with it. After that uses the heat to melt the resulting material and add additional Ozone.
block.epsilon-sand-filter.name = Sand Filter
block.epsilon-sand-filter.description = Breaks down red sand into small pieces to obtain the resources contained within.
